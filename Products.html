<!DOCTYPE html>
<html lang="en">
<head> 
    <link rel="stylesheet" href="Styles.css"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT MARKETPLACE</title>
</head> 

<body>

<header>
    <h1>STUDENT MARKETPLACE</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="Sell.html">Sell</a>
        <a href="#">Categories</a>
        <a href="#">Detail</a>
    </nav>
</header>

<main>

    <section>
        <h2>Our Products</h2>
        <p>Browse items listed by students.</p>

        <!-- SEARCH -->
        <input type="text" id="searchBox" placeholder="Search products...">

        <!-- CATEGORIES -->
        <div id="categories"></div>

        <!-- PRODUCT LIST -->
        <div id="productList"></div>
    </section>

    <!-- PRODUCT DETAIL -->
    <section>
        <h2>Product Detail</h2>
        <div id="productDetail">
            <p>Click a product to view details.</p>
        </div>
    </section>

</main>

<footer>
    <p>&copy; 2026 Student Marketplace. All rights reserved.</p>
</footer>

<script>

// DATA (single source of truth)
const products = [
  { id: 1, name: "Calculus Textbook", category: "books", price: 50 },
  { id: 2, name: "Laptop", category: "electronics", price: 300 },
  { id: 3, name: "Study Lamp", category: "furniture", price: 100 },
  { id: 4, name: "Notebook", category: "books", price: 10 }
];

let currentCategory = "";
let searchValue = "";

// DISPLAY PRODUCTS
function displayProducts(items) {
  const list = document.getElementById("productList");
  list.innerHTML = "";

  if (items.length === 0) {
    list.innerHTML = "<p>No products found</p>";
    return;
  }

  items.forEach(p => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>Category: ${p.category}</p>
      <p>Price: $${p.price}</p>
      <button onclick="viewProduct(${p.id})">View</button>
   `;

    list.appendChild(div);
  });
}

// PRODUCT DETAIL
function viewProduct(id) {
  const product = products.find(p => p.id === id);

  document.getElementById("productDetail").innerHTML = `
    <h3>${product.name}</h3>
    <p>Category: ${product.category}</p>
    <p>Price: $${product.price}</p>
  `;
}

// CATEGORY SETUP
const categories = [...new Set(products.map(p => p.category))];
const catDiv = document.getElementById("categories");

categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.textContent = cat;
  btn.onclick = () => {
    currentCategory = cat;
    applyFilters();
  };
  catDiv.appendChild(btn);
});

// SEARCH
document.getElementById("searchBox").addEventListener("input", function () {
  searchValue = this.value.toLowerCase();
  applyFilters();
});

// APPLY FILTERS
function applyFilters() {
  let filtered = products;

  if (currentCategory) {
    filtered = filtered.filter(p => p.category === currentCategory);
  }

  if (searchValue) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(searchValue)
    );
  }

  displayProducts(filtered);
}

// INITIAL LOAD
displayProducts(products);

</script>

</body>
</html>
